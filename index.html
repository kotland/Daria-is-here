*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f6f2;color:#2a2a28;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;position:relative}

@keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20px,30px) scale(1.05)}}

@keyframes d3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,15px) scale(0.95)}}
@keyframes d4{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,20px)}}
.app{max-width:480px;margin:0 auto;padding:24px 20px;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
.progress{height:2px;background:rgba(0,0,0,0.04);margin-bottom:32px;overflow:hidden;border-radius:1px}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(140,120,180,0.5),rgba(160,140,200,0.7));transition:width 0.6s cubic-bezier(0.4,0,0.2,1);width:0%}
.screen{display:none;flex:1;flex-direction:column;animation:fadeIn 0.6s cubic-bezier(0.4,0,0.2,1)}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ring-wrap{display:flex;justify-content:center;margin:40px 0 48px}
.ring{width:180px;height:180px;border-radius:50%;position:relative;animation:ringFloat 4s ease-in-out infinite}
.ring::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,rgba(140,120,200,0.6),rgba(100,180,200,0.4),rgba(180,140,180,0.5),rgba(120,160,220,0.6),rgba(140,120,200,0.6));animation:ringRotate 8s linear infinite;filter:blur(1px)}
.ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:rgba(248,246,242,0.85);backdrop-filter:blur(20px)}
.ring-glow{position:absolute;inset:-20px;border-radius:50%;background:conic-gradient(from 0deg,rgba(140,120,200,0.15),rgba(100,180,200,0.1),rgba(180,140,180,0.12),rgba(120,160,220,0.15),rgba(140,120,200,0.15));filter:blur(25px);animation:ringRotate 8s linear infinite}
.ring-inner{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;border-radius:50%}
.ring-inner canvas{border-radius:50%;width:168px;height:168px}
@keyframes ringFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes ringRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.start-title{font-size:30px;font-weight:700;line-height:1.25;margin-bottom:16px;color:#2a2a28;letter-spacing:-0.5px;text-align:center}

.start-tag{display:block;width:fit-content;margin:0 auto 20px;color:rgba(42,42,40,0.3);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase}
.q-num{font-size:11px;color:rgba(90,70,130,0.7);font-weight:500;letter-spacing:3px;margin-bottom:20px;margin-top:20px}

.options{display:flex;flex-direction:column;gap:8px}

.opt:hover{background:rgba(255,255,255,0.85);border-color:rgba(120,100,160,0.15);color:#2a2a28}

.result-card{background:rgba(255,255,255,0.45);border:1px solid rgba(0,0,0,0.04);border-radius:24px;padding:36px 24px;margin-bottom:20px;backdrop-filter:blur(20px);margin-top:20px}
.result-emoji{font-size:48px;text-align:center;margin-bottom:20px}

.result-label{text-align:center;font-size:11px;color:rgba(42,42,40,0.25);margin-bottom:24px;letter-spacing:2px;text-transform:uppercase}
.result-bar{height:3px;background:rgba(0,0,0,0.04);border-radius:2px;margin-bottom:24px;overflow:hidden}
.result-bar-fill{height:100%;border-radius:2px;transition:width 1.8s cubic-bezier(0.4,0,0.2,1)}
.result-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:10px;color:#2a2a28}
.result-title em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:#3a2a5a;font-size:1.1em}
.result-text{font-size:13px;color:rgba(42,42,40,0.5);line-height:1.65;text-align:center}

.rec-block-title{font-size:13px;font-weight:700;color:#3a2a5a;margin-bottom:8px;letter-spacing:0.5px}
.rec-block-text{font-size:13px;color:rgba(42,42,40,0.6);line-height:1.6}
.rec-block-score{font-size:11px;color:rgba(90,70,130,0.5);margin-bottom:6px;letter-spacing:1px}
.rec-bar-wrap{height:3px;background:rgba(0,0,0,0.04);border-radius:2px;margin-bottom:10px;overflow:hidden}
.rec-bar-fill{height:100%;border-radius:2px;transition:width 1.2s ease}
.btn{display:flex;width:100%;padding:15px 24px;border:none;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.3s;text-decoration:none;font-family:'Inter',sans-serif;align-items:center;justify-content:center;gap:10px;letter-spacing:0.2px}
.btn-primary{background:rgba(255,255,255,0.7);color:#2a2a28;border:1px solid rgba(0,0,0,0.06);backdrop-filter:blur(12px);box-shadow:0 2px 16px rgba(0,0,0,0.04);margin-bottom:10px}

.btn-secondary{background:rgba(255,255,255,0.3);color:rgba(58,42,90,0.6);border:1px solid rgba(120,100,160,0.1);backdrop-filter:blur(8px)}
.btn-secondary:hover{background:rgba(255,255,255,0.5);color:#3a2a5a}
.btn svg{width:16px;height:16px;transition:transform 0.3s}
.btn:hover svg{transform:translate(2px,-2px)}
/* Start button - special */
.btn-start{display:flex;width:100%;padding:18px 28px;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.4s;font-family:"Inter",sans-serif;align-items:center;justify-content:center;gap:10px;letter-spacing:0.3px;background:linear-gradient(135deg,rgba(140,120,200,0.15),rgba(120,160,200,0.12));color:#2a2a28;border:1.5px solid rgba(120,100,160,0.18);backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(120,100,160,0.1),0 0 0 1px rgba(255,255,255,0.4) inset;animation:btnPulse 3s ease-in-out infinite}
.btn-start:hover{background:linear-gradient(135deg,rgba(140,120,200,0.25),rgba(120,160,200,0.2));box-shadow:0 6px 32px rgba(120,100,160,0.18),0 0 0 1px rgba(255,255,255,0.5) inset;transform:translateY(-2px)}
.btn-start svg{width:16px;height:16px;transition:transform 0.3s}
.btn-start:hover svg{transform:translate(2px,-2px)}
@keyframes btnPulse{0%,100%{box-shadow:0 4px 24px rgba(120,100,160,0.1),0 0 0 1px rgba(255,255,255,0.4) inset}50%{box-shadow:0 4px 32px rgba(120,100,160,0.2),0 0 0 1px rgba(255,255,255,0.5) inset,0 0 40px rgba(140,120,200,0.08)}}

.block-intro-num{font-size:11px;color:rgba(90,70,130,0.5);letter-spacing:3px;margin-bottom:12px;text-transform:uppercase}
.block-intro-name{font-family:"Playfair Display",serif;font-style:italic;font-size:28px;color:#3a2a5a;margin-bottom:8px;text-align:center}

.footer{text-align:center;padding:24px 0;font-size:10px;color:rgba(42,42,40,0.35);margin-top:auto;letter-spacing:1px;text-transform:uppercase}
</style>
</head>

<script>
const canvas=document.getElementById('ringCanvas');
if(canvas){const ctx=canvas.getContext('2d');const w=168,h=168;let t=0;function drawRing(){ctx.clearRect(0,0,w,h);ctx.save();ctx.beginPath();ctx.arc(w/2,h/2,80,0,Math.PI*2);ctx.clip();for(let i=0;i<20;i++){const x=w*0.15+i*(w*0.7/20);const brightness=0.15+0.15*Math.sin(t*0.02+i*0.5);const hue=220+20*Math.sin(t*0.01+i*0.3);ctx.beginPath();ctx.strokeStyle=`hsla(${hue},40%,70%,${brightness})`;ctx.lineWidth=2+Math.sin(t*0.03+i)*1;ctx.moveTo(x,0);ctx.lineTo(x+Math.sin(t*0.015+i)*3,h);ctx.stroke()}const grd=ctx.createRadialGradient(w/2,h/2,10,w/2,h/2,80);grd.addColorStop(0,'rgba(160,140,220,0.1)');grd.addColorStop(0.5,'rgba(120,160,200,0.05)');grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);ctx.restore();t++;requestAnimationFrame(drawRing)}drawRing()}

const blocks=[
{name:"Доверие",qs:[0,1,2,3],advice:{low:"Клиент не чувствует, что вам можно доверять. Начните показывать процесс работы, познакомьте с командой, будьте прозрачны в коммуникации.",mid:"Базовое доверие есть, но оно хрупкое. Усильте присутствие команды в контенте и покажите, как вы работаете с ошибками — это вызывает больше доверия, чем идеальная картинка.",high:"Доверие — ваша сильная сторона. Клиент чувствует, что за брендом стоят реальные люди. Продолжайте."}},
{name:"Первое касание",qs:[4,5,6,7],advice:{low:"Первый контакт отталкивает или не запоминается. Начинайте не с цены, а с эмоции или пользы. У вас есть 3 секунды — используйте их.",mid:"Первое впечатление неплохое, но можно сильнее. Добавьте историю или бесплатную ценность в точку входа.",high:"Вы цепляете с первого касания. Клиент чувствует — это моё. Редкое качество."}},
{name:"Продукт и ощущение",qs:[8,9,10,11],advice:{low:"Вы продаёте функцию, а не ощущение. В 2026 году люди покупают не что вы делаете, а как они себя чувствуют. Подумайте: какой момент в жизни клиента вы занимаете?",mid:"Есть эмоциональная обёртка, но можно глубже. Создайте ритуал вокруг продукта — момент, по которому скучают.",high:"Ваш продукт — это ощущение. Клиент возвращается за состоянием, не за функцией. Это 1% рынка."}},
{name:"Лояльность",qs:[12,13,14,15],advice:{low:"Клиенты приходят по цене и уходят по цене. Нет эмоциональной привязки. Начните с малого: запомните имена, создайте ритуал возвращения.",mid:"Есть повторные покупки, но больше по привычке. Превратите привычку в принадлежность — покажите клиенту, что он часть чего-то.",high:"У вас есть адвокаты бренда. Люди не просто покупают — они защищают вас. Это самый ценный актив."}},
{name:"Современность",qs:[16,17,18,19],advice:{low:"Бизнес работает по модели 2023 года. ИИ не интегрирован, процесс скрыт, миссии нет. Начните с простого: покажите закулисье и задайте себе вопрос «зачем мы это делаем?»",mid:"Вы движетесь, но медленнее рынка. Интегрируйте ИИ хотя бы для внутренних задач и начните показывать процесс, а не только результат.",high:"Вы на острие. ИИ интегрирован, процесс прозрачен, миссия считывается. Следующий шаг — инфраструктурность для своей индустрии."}}

const questions=[
// Block 1: Trust
{q:"Как клиент впервые <em>узнаёт</em> о вас?",b:0,opts:[{t:"Случайно находит в поиске или на маркетплейсе",p:1},{t:"Видит рекламу или пост в соцсетях",p:2},{t:"Слышит рекомендацию от знакомого",p:3},{t:"Сам не понимает как — просто остался",p:4}]},

{q:"С чего <em>начинается</em> контакт клиента с вами?",b:1,opts:[{t:"С прайса или каталога",p:1},{t:"С описания продукта",p:2},{t:"С чего-то бесплатного и полезного",p:3},{t:"С истории, видео или эмоции",p:4}]},

{q:"Есть ли у продукта <em>ритуал</em> — момент, по которому скучают?",b:2,opts:[{t:"Нет, это просто продукт",p:1},{t:"Есть приятные детали",p:2},{t:"Да, клиенты сами об этом говорят",p:3},{t:"Весь опыт — это ритуал",p:4}]},
{q:"Может ли продукт быть нужен <em>разным</em> людям по разным причинам?",b:2,opts:[{t:"Нет, у нас узкая аудитория",p:1},{t:"Возможно, но мы об этом не думали",p:2},{t:"Да, мы видим разные сегменты",p:3},{t:"Да, и мы говорим с каждым по-своему",p:4}]},
{q:"Как выглядит ваш продукт <em>физически</em>?",b:2,opts:[{t:"Обычно, как у всех в нише",p:1},{t:"Аккуратно, но ничего особенного",p:2},{t:"Продуманно — дизайн важен для нас",p:3},{t:"Каждая деталь несёт смысл",p:4}]},
// Block 4: Loyalty
{q:"Зачем клиент <em>возвращается</em> повторно?",b:3,opts:[{t:"Дешевле или удобнее",p:1},{t:"Привычка",p:2},{t:"Нравится процесс взаимодействия",p:3},{t:"Чувствует себя частью чего-то",p:4}]},
{q:"Рекомендуют ли вас <em>без просьбы</em>?",b:3,opts:[{t:"Нет, только если спросят",p:1},{t:"Иногда",p:2},{t:"Регулярно — это наш главный канал",p:3},{t:"Клиенты сами создают контент о нас",p:4}]},
{q:"Есть ли клиенты, которые <em>защищают</em> вас в комментариях?",b:3,opts:[{t:"Нет",p:1},{t:"Не замечал",p:2},{t:"Да, несколько таких есть",p:3},{t:"Да, и мы знаем их по именам",p:4}]},
{q:"Знаете ли вы <em>по имени</em> своих постоянных клиентов?",b:3,opts:[{t:"Нет, их слишком много / мало",p:1},{t:"Некоторых",p:2},{t:"Большинство постоянных — да",p:3},{t:"Да, и помню их историю с нами",p:4}]},
// Block 5: Modern
{q:"Используете ли вы <em>ИИ</em> в бизнесе?",b:4,opts:[{t:"Нет",p:1},{t:"Для внутренних задач",p:2},{t:"Клиент взаимодействует с ИИ",p:3},{t:"ИИ встроен в продукт",p:4}]},
{q:"Ваш <em>бренд</em> — это вы или система?",b:4,opts:[{t:"Без меня ничего не работает",p:1},{t:"Бренд сам по себе, я в тени",p:2},{t:"Я лицо, но есть система",p:3},{t:"Личный + продуктовый усиливают друг друга",p:4}]},
{q:"Показываете ли вы <em>процесс</em>, а не только результат?",b:4,opts:[{t:"Только готовый результат",p:1},{t:"Иногда бэкстейдж",p:2},{t:"Регулярно показываем как создаём",p:3},{t:"Процесс — часть нашего контента",p:4}]},
{q:"Есть ли у бизнеса <em>миссия</em> — или только продажи?",b:4,opts:[{t:"Только продажи, это нормально",p:1},{t:"Есть миссия, но мы о ней не говорим",p:2},{t:"Миссия есть и клиент её видит",p:3},{t:"Миссия — причина почему мы существуем",p:4}]}
];

const results=[
{min:20,max:32,emoji:"🔴",title:"Бизнес <em>невидим</em>",text:"Клиент в 2026 вас не считывает. Биологический интеллект не получает сигналов доверия. Нужна перестройка — от упаковки до смыслов.",color:"linear-gradient(90deg,#C4889A,#D8A0B0)"},
{min:33,max:48,emoji:"🟠",title:"<em>Функционал</em> без души",text:"Продукт работает, но не цепляет. Вас выбирают по цене или удобству — и так же легко уйдут к конкуренту.",color:"linear-gradient(90deg,#C4A070,#D8B888)"},
{min:49,max:60,emoji:"🟡",title:"<em>На пути</em>",text:"Вы чувствуете что рынок меняется и адаптируетесь. Фундамент есть — нужно работать с глубиной и эмоциями.",color:"linear-gradient(90deg,#B8B468,#CCC880)"},
{min:61,max:72,emoji:"🟢",title:"Чувствуете <em>тренды</em>",text:"Клиент выбирает вас не только логикой. Есть эмоциональная связь, доверие, возвращаемость. Осталось усилить несколько точек.",color:"linear-gradient(90deg,#88B498,#A0C8B0)"},
{min:73,max:80,emoji:"💎",title:"В <em>одном проценте</em>",text:"Ваш бизнес говорит с биологическим интеллектом. Доверие, энергия, прозрачность. Клиенты возвращаются за ощущением.",color:"linear-gradient(90deg,#8A88C4,#A8A0D8)"}
];

let current=-1,score=0,blockScores=[0,0,0,0,0];
const TOTAL=20;

function startQuiz(){current=0;score=0;blockScores=[0,0,0,0,0];showQuestion()}
function showBlockIntro(blockIdx){document.getElementById("startScreen").classList.remove("active");document.getElementById("resultScreen").classList.remove("active");const qs=document.getElementById("questionScreen");qs.classList.remove("active");void qs.offsetWidth;qs.classList.add("active");const names=["Доверие","Первое касание","Продукт и ощущение","Лояльность","Современность"];const subs=["Считывает ли клиент, что вам можно верить","Что чувствует клиент в первые секунды","Покупают задачу или ощущение","Возвращаются ли к вам по любви","Готов ли бизнес к реальности 2026"];document.getElementById("qNum").textContent="";document.getElementById("qText").innerHTML="";document.getElementById("options").innerHTML=`<div class="block-intro"><div class="block-intro-num">Блок ${blockIdx+1} из 5</div><div class="block-intro-line"></div><div class="block-intro-name">${names[blockIdx]}</div><div class="block-intro-sub">${subs[blockIdx]}</div><button class="btn btn-primary" onclick="showQuestion()" style="max-width:240px">Продолжить <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></button></div>`;document.getElementById("progressFill").style.width=((current)/20*100)+"%"}
function showQuestion(){
document.getElementById('startScreen').classList.remove('active');
document.getElementById('resultScreen').classList.remove('active');
const qs=document.getElementById('questionScreen');qs.classList.remove('active');void qs.offsetWidth;qs.classList.add('active');
const q=questions[current];
document.getElementById('qNum').textContent=`${current+1} / ${TOTAL}`;
document.getElementById('qText').innerHTML=q.q;
document.getElementById('progressFill').style.width=((current)/TOTAL*100)+'%';
const opts=document.getElementById('options');opts.innerHTML='';
[...q.opts].sort(()=>Math.random()-0.5).forEach(o=>{const d=document.createElement('div');d.className='opt';d.textContent=o.t;d.onclick=()=>sel(d,o.p,q.b);opts.appendChild(d)});
}
function sel(el,p,b){
document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
el.classList.add('selected');score+=p;blockScores[b]+=p;
setTimeout(()=>{current++;if(current>=TOTAL){showResult()}else if(current%4===0){showBlockIntro(Math.floor(current/4))}else{showQuestion()}},400);
}
function showResult(){
document.getElementById('questionScreen').classList.remove('active');
document.getElementById('progressFill').style.width='100%';
const r=results.find(r=>score>=r.min&&score<=r.max)||results[results.length-1];
document.getElementById('resEmoji').textContent=r.emoji;
document.getElementById('resScore').textContent=score;
document.getElementById('resTitle').innerHTML=r.title;
document.getElementById('resText').textContent=r.text;
const bar=document.getElementById('resBar');bar.style.background=r.color;
setTimeout(()=>{bar.style.width=(score/80*100)+'%'},100);
document.getElementById('resultScreen').classList.add('active');
if(window.Telegram&&Telegram.WebApp){try{Telegram.WebApp.HapticFeedback.notificationOccurred('success')}catch(e){}}
}
function toggleRecs(){
const el=document.getElementById('recsBlock');
if(el.classList.contains('show')){el.classList.remove('show');return}
el.innerHTML='';
blocks.forEach((bl,i)=>{
const s=blockScores[i];const max=16;const pct=Math.round(s/max*100);
let level=s<=6?'low':s<=11?'mid':'high';
const colors=["#C4889A","#C4A070","#B8B468","#88B498","#8A88C4"];
el.innerHTML+=`<div class="rec-block">
<div class="rec-block-score">${bl.name} — ${s}/${max}</div>
<div class="rec-bar-wrap"><div class="rec-bar-fill" style="width:${pct}%;background:${colors[i]}"></div></div>
<div class="rec-block-title">${level==='high'?'✓ Сильная сторона':level==='mid'?'→ Есть потенциал':'✗ Требует внимания'}</div>
<div class="rec-block-text">${bl.advice[level]}</div>
</div>`;
});
el.classList.add('show');
setTimeout(()=>{document.querySelectorAll('.rec-bar-fill').forEach(b=>{b.style.width=b.style.width})},50);
}
function shareResult(){const r=results.find(r=>score>=r.min&&score<=r.max)||results[results.length-1];
const t=`🧠 Мой бизнес глазами клиента 2026: ${score}/80\n\nПройди тест: https://kotland.github.io/Daria-is-here/`;
if(navigator.share){navigator.share({text:t}).catch(()=>{})}else{navigator.clipboard.writeText(t).then(()=>{event.target.closest('.btn').innerHTML='✓ Скопировано';setTimeout(()=>{event.target.closest('.btn').innerHTML='Поделиться результатом <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>'},2000)})}}
if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand()}
</script>
</body>
</html>

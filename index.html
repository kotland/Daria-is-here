<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Оценка бизнеса 2026</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f6f2;color:#2a2a28;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;position:relative}

/* Rich gradient blobs */
.grad1{position:fixed;top:-25%;right:-20%;width:65%;height:65%;background:radial-gradient(ellipse,rgba(160,140,200,0.3) 0%,rgba(140,120,190,0.08) 50%,transparent 70%);filter:blur(60px);pointer-events:none;z-index:0;animation:d1 18s ease-in-out infinite}
.grad2{position:fixed;bottom:-20%;left:-15%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(130,190,180,0.25) 0%,rgba(110,170,160,0.06) 50%,transparent 70%);filter:blur(55px);pointer-events:none;z-index:0;animation:d2 15s ease-in-out infinite}
.grad3{position:fixed;top:30%;left:10%;width:45%;height:45%;background:radial-gradient(ellipse,rgba(220,180,140,0.2) 0%,transparent 60%);filter:blur(50px);pointer-events:none;z-index:0;animation:d3 20s ease-in-out infinite}
.grad4{position:fixed;top:10%;right:10%;width:30%;height:30%;background:radial-gradient(ellipse,rgba(180,160,220,0.15) 0%,transparent 60%);filter:blur(40px);pointer-events:none;z-index:0;animation:d4 13s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20px,30px) scale(1.05)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-20px)}}
@keyframes d3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,15px) scale(0.95)}}
@keyframes d4{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,20px)}}

.app{max-width:480px;margin:0 auto;padding:24px 20px;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}

.progress{height:2px;background:rgba(0,0,0,0.04);margin-bottom:40px;overflow:hidden;border-radius:1px}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(140,120,180,0.5),rgba(160,140,200,0.7));transition:width 0.6s cubic-bezier(0.4,0,0.2,1);width:0%}

.screen{display:none;flex:1;flex-direction:column;animation:fadeIn 0.6s cubic-bezier(0.4,0,0.2,1)}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Ring portal */
.ring-wrap{display:flex;justify-content:center;margin:40px 0 48px}
.ring{width:180px;height:180px;border-radius:50%;position:relative;animation:ringFloat 4s ease-in-out infinite}
.ring::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,rgba(140,120,200,0.6),rgba(100,180,200,0.4),rgba(180,140,180,0.5),rgba(120,160,220,0.6),rgba(140,120,200,0.6));animation:ringRotate 8s linear infinite;filter:blur(1px)}
.ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:rgba(248,246,242,0.85);backdrop-filter:blur(20px)}
.ring-glow{position:absolute;inset:-20px;border-radius:50%;background:conic-gradient(from 0deg,rgba(140,120,200,0.15),rgba(100,180,200,0.1),rgba(180,140,180,0.12),rgba(120,160,220,0.15),rgba(140,120,200,0.15));filter:blur(25px);animation:ringRotate 8s linear infinite}
.ring-inner{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;border-radius:50%}
.ring-inner canvas{border-radius:50%;width:168px;height:168px}
@keyframes ringFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes ringRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* Start */
.start-title{font-size:30px;font-weight:700;line-height:1.25;margin-bottom:16px;color:#2a2a28;letter-spacing:-0.5px;text-align:center}
.start-title em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:#6a5a8a}
.start-sub{font-size:14px;color:rgba(42,42,40,0.45);text-align:center;line-height:1.65;margin-bottom:40px;padding:0 12px}
.start-tag{display:block;width:fit-content;margin:0 auto 20px;color:rgba(42,42,40,0.3);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase}

/* Question */
.q-num{font-size:11px;color:rgba(120,100,160,0.5);font-weight:500;letter-spacing:3px;margin-bottom:20px;margin-top:40px}
.q-text{font-size:24px;font-weight:700;line-height:1.3;margin-bottom:36px;color:#2a2a28;letter-spacing:-0.3px}
.q-text em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:#6a5a8a}

/* Options */
.options{display:flex;flex-direction:column;gap:8px}
.opt{background:rgba(255,255,255,0.55);border:1px solid rgba(0,0,0,0.05);border-radius:14px;padding:15px 18px;font-size:14px;line-height:1.5;color:rgba(42,42,40,0.6);cursor:pointer;transition:all 0.3s;text-align:left;backdrop-filter:blur(12px)}
.opt:hover{background:rgba(255,255,255,0.8);border-color:rgba(120,100,160,0.12);color:#2a2a28}
.opt.selected{background:rgba(255,255,255,0.9);border-color:rgba(120,100,160,0.25);color:#2a2a28;box-shadow:0 2px 20px rgba(120,100,160,0.08)}

/* Result */
.result-card{background:rgba(255,255,255,0.45);border:1px solid rgba(0,0,0,0.04);border-radius:24px;padding:40px 24px;margin-bottom:28px;backdrop-filter:blur(20px);margin-top:20px}
.result-emoji{font-size:48px;text-align:center;margin-bottom:24px}
.result-score{text-align:center;font-family:'Playfair Display',serif;font-size:56px;font-weight:700;color:#6a5a8a;margin-bottom:4px;letter-spacing:-2px}
.result-label{text-align:center;font-size:11px;color:rgba(42,42,40,0.25);margin-bottom:28px;letter-spacing:2px;text-transform:uppercase}
.result-bar{height:3px;background:rgba(0,0,0,0.04);border-radius:2px;margin-bottom:28px;overflow:hidden}
.result-bar-fill{height:100%;border-radius:2px;transition:width 1.8s cubic-bezier(0.4,0,0.2,1)}
.result-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:12px;color:#2a2a28}
.result-title em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:#6a5a8a}
.result-text{font-size:13px;color:rgba(42,42,40,0.45);line-height:1.7;text-align:center}

/* Buttons - glass pill + SVG arrow */
.btn{display:flex;width:100%;padding:15px 24px;border:none;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.3s;text-decoration:none;font-family:'Inter',sans-serif;align-items:center;justify-content:center;gap:10px;letter-spacing:0.2px}
.btn-primary{background:rgba(255,255,255,0.7);color:#2a2a28;border:1px solid rgba(0,0,0,0.06);backdrop-filter:blur(12px);box-shadow:0 2px 16px rgba(0,0,0,0.04)}
.btn-primary:hover{background:rgba(255,255,255,0.9);box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.btn-secondary{background:rgba(255,255,255,0.3);color:rgba(106,90,138,0.7);border:1px solid rgba(120,100,160,0.1);margin-top:10px;backdrop-filter:blur(8px)}
.btn-secondary:hover{background:rgba(255,255,255,0.5);color:#6a5a8a}
.btn svg{width:16px;height:16px;transition:transform 0.3s}
.btn:hover svg{transform:translate(2px,-2px)}

.footer{text-align:center;padding:24px 0;font-size:10px;color:rgba(42,42,40,0.15);margin-top:auto;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
<div class="grad1"></div><div class="grad2"></div><div class="grad3"></div><div class="grad4"></div>
<div class="app">
<div class="progress" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<div class="screen active" id="startScreen">
<div class="ring-wrap"><div class="ring"><div class="ring-glow"></div><div class="ring-inner"><canvas id="ringCanvas" width="168" height="168"></canvas></div></div></div>
<div class="start-tag">10 вопросов · 2 минуты</div>
<div class="start-title">Как ваш бизнес выглядит <em>глазами клиента</em> в 2026?</div>
<div class="start-sub">Биологический интеллект вашего покупателя изменился. Узнайте, считывает ли клиент ваш бизнес — или проходит мимо.</div>
<button class="btn btn-primary" onclick="startQuiz()">Начать диагностику <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></button>
</div>

<div class="screen" id="questionScreen">
<div class="q-num" id="qNum"></div>
<div class="q-text" id="qText"></div>
<div class="options" id="options"></div>
</div>

<div class="screen" id="resultScreen">
<div class="result-card">
<div class="result-emoji" id="resEmoji"></div>
<div class="result-score" id="resScore"></div>
<div class="result-label">из 40 баллов</div>
<div class="result-bar"><div class="result-bar-fill" id="resBar"></div></div>
<div class="result-title" id="resTitle"></div>
<div class="result-text" id="resText"></div>
</div>
<button class="btn btn-primary" onclick="shareResult()">Поделиться результатом <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></button>
<a class="btn btn-secondary" href="https://t.me/daria_kotenkova" target="_blank">Разобрать бизнес подробнее <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></a>
</div>

<div class="footer">Основано на исследованиях биологического интеллекта</div>
</div>

<script>
// Ring canvas animation - vertical light streaks
const canvas=document.getElementById('ringCanvas');
if(canvas){
const ctx=canvas.getContext('2d');
const w=168,h=168;
let t=0;
function drawRing(){
ctx.clearRect(0,0,w,h);
// Circular clip
ctx.save();
ctx.beginPath();ctx.arc(w/2,h/2,80,0,Math.PI*2);ctx.clip();
// Vertical light streaks
for(let i=0;i<20;i++){
const x=w*0.15+i*(w*0.7/20);
const brightness=0.15+0.15*Math.sin(t*0.02+i*0.5);
const hue=220+20*Math.sin(t*0.01+i*0.3);
ctx.beginPath();
ctx.strokeStyle=`hsla(${hue},40%,70%,${brightness})`;
ctx.lineWidth=2+Math.sin(t*0.03+i)*1;
ctx.moveTo(x,0);ctx.lineTo(x+Math.sin(t*0.015+i)*3,h);
ctx.stroke();
}
// Center glow
const grd=ctx.createRadialGradient(w/2,h/2,10,w/2,h/2,80);
grd.addColorStop(0,'rgba(160,140,220,0.1)');
grd.addColorStop(0.5,'rgba(120,160,200,0.05)');
grd.addColorStop(1,'transparent');
ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
ctx.restore();
t++;requestAnimationFrame(drawRing);
}
drawRing();
}

const questions=[
{q:"Как клиент впервые <em>узнаёт</em> о вас?",opts:[{t:"Через поиск / GPT / маркетплейс",p:1},{t:"Через соцсети / рекламу",p:2},{t:"Через рекомендацию знакомого",p:3},{t:"Просто увидел и остался",p:4}]},
{q:"Что вы показываете как <em>доказательство</em> качества?",opts:[{t:"Ничего — продукт говорит сам",p:1},{t:"Отзывы и рейтинги",p:2},{t:"Кейсы и портфолио",p:3},{t:"Процесс работы и закулисье",p:4}]},
{q:"Видит ли клиент вашу <em>команду</em>?",opts:[{t:"Только логотип и продукт",p:1},{t:"Фото команды на сайте",p:2},{t:"Команда в контенте регулярно",p:3},{t:"Их знают по именам",p:4}]},
{q:"С чего <em>начинается</em> контакт с вами?",opts:[{t:"С цены и каталога",p:1},{t:"С описания продукта",p:2},{t:"С бесплатной пользы",p:3},{t:"С истории и эмоции",p:4}]},
{q:"Сколько <em>времени</em> нужно чтобы понять — моё?",opts:[{t:"Не знаю, не замерял",p:1},{t:"Нужно изучить, много текста",p:2},{t:"Пара минут, понятно из визуала",p:3},{t:"Секунды — чувствует сразу",p:4}]},
{q:"Продукт решает задачу или создаёт <em>ощущение</em>?",opts:[{t:"Чисто задача",p:1},{t:"Задача + эмоциональная обёртка",p:2},{t:"50/50",p:3},{t:"Больше ощущение",p:4}]},
{q:"Зачем клиент <em>возвращается</em> повторно?",opts:[{t:"Дешевле конкурентов",p:1},{t:"Привычка",p:2},{t:"Нравится процесс",p:3},{t:"Чувствует себя частью",p:4}]},
{q:"Что <em>GPT</em> скажет о вас клиенту?",opts:[{t:"Нас нет в интернете",p:1},{t:"Базовая информация",p:2},{t:"Отзывы и упоминания",p:3},{t:"Целая история бренда",p:4}]},
{q:"Используете ли вы <em>ИИ</em> в бизнесе?",opts:[{t:"Нет",p:1},{t:"Для внутренних задач",p:2},{t:"Клиент взаимодействует с ИИ",p:3},{t:"ИИ встроен в продукт",p:4}]},
{q:"Ваш <em>бренд</em> — это вы или система?",opts:[{t:"Без меня ничего не работает",p:1},{t:"Бренд сам, я за кулисами",p:2},{t:"Я лицо, но есть система",p:3},{t:"Личный + продуктовый усиливают друг друга",p:4}]}
];
const results=[
{min:10,max:17,emoji:"🔴",title:"Бизнес <em>невидим</em>",text:"Ваш бизнес говорит на языке 2023. Биологический интеллект клиента не получает сигналов доверия. Высокий риск потери клиентов.",color:"linear-gradient(90deg,#C4889A,#D8A0B0)"},
{min:18,max:25,emoji:"🟡",title:"Покупают, но <em>не любят</em>",text:"Продукт хороший, но вы продаёте характеристики. Клиент не возвращается по любви. Один конкурент — и уйдут.",color:"linear-gradient(90deg,#C4AA78,#D8C498)"},
{min:26,max:33,emoji:"🟢",title:"Вы чувствуете <em>тренды</em>",text:"Клиент выбирает вас не только логикой. Фундамент сильный. Есть над чем работать в глубине.",color:"linear-gradient(90deg,#88B498,#A0C8B0)"},
{min:34,max:40,emoji:"💎",title:"Вы в <em>одном проценте</em>",text:"Ваш бизнес говорит с биологическим интеллектом. Доверие через энергию, команду, прозрачность.",color:"linear-gradient(90deg,#8A88C4,#A8A0D8)"}
];
let current=-1,score=0;
function startQuiz(){current=0;score=0;showQuestion()}
function showQuestion(){
document.getElementById('startScreen').classList.remove('active');
document.getElementById('resultScreen').classList.remove('active');
const qs=document.getElementById('questionScreen');qs.classList.remove('active');void qs.offsetWidth;qs.classList.add('active');
const q=questions[current];document.getElementById('qNum').textContent=`${current+1} / 10`;
document.getElementById('qText').innerHTML=q.q;document.getElementById('progressFill').style.width=((current)/10*100)+'%';
const opts=document.getElementById('options');opts.innerHTML='';
[...q.opts].sort(()=>Math.random()-0.5).forEach(o=>{const d=document.createElement('div');d.className='opt';d.textContent=o.t;d.onclick=()=>sel(d,o.p);opts.appendChild(d)});
}
function sel(el,p){document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');score+=p;setTimeout(()=>{current++;current<10?showQuestion():showResult()},400)}
function showResult(){
document.getElementById('questionScreen').classList.remove('active');document.getElementById('progressFill').style.width='100%';
const r=results.find(r=>score>=r.min&&score<=r.max)||results[0];
document.getElementById('resEmoji').textContent=r.emoji;document.getElementById('resScore').textContent=score;
document.getElementById('resTitle').innerHTML=r.title;document.getElementById('resText').textContent=r.text;
const bar=document.getElementById('resBar');bar.style.background=r.color;setTimeout(()=>{bar.style.width=(score/40*100)+'%'},100);
document.getElementById('resultScreen').classList.add('active');
if(window.Telegram&&Telegram.WebApp){try{Telegram.WebApp.HapticFeedback.notificationOccurred('success')}catch(e){}}
}
function shareResult(){const r=results.find(r=>score>=r.min&&score<=r.max)||results[0];
const t=`🧠 Мой бизнес глазами клиента 2026: ${score}/40\n\nПройди тест: https://kotland.github.io/Daria-is-here/`;
if(navigator.share){navigator.share({text:t}).catch(()=>{})}else{navigator.clipboard.writeText(t).then(()=>{const b=event.target.closest('.btn');b.innerHTML='✓ Скопировано';setTimeout(()=>{b.innerHTML='Поделиться результатом <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>'},2000)})}}
if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand()}
</script>
</body>
</html>
